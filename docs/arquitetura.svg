<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#37474f"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1565c0"/>
    </marker>
    <marker id="arrowPurple" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6a1b9a"/>
    </marker>
  </defs>

  <!-- Fundo -->
  <rect x="0" y="0" width="1200" height="920" fill="#ffffff"/>

  <!-- Título -->
  <text x="600" y="40" text-anchor="middle" font-size="27" font-weight="700" fill="#1a237e">Projeto Korp — Arquitetura DevOps</text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#607d8b">Go · Nginx · Docker · Prometheus · Grafana · Ansible — provisionamento com um único comando</text>

  <!-- ===================== Coluna de acesso (esquerda) ===================== -->
  <rect x="40" y="105" width="185" height="66" rx="10" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
  <text x="132" y="133" text-anchor="middle" font-size="14" font-weight="700" fill="#37474f">Cliente</text>
  <text x="132" y="153" text-anchor="middle" font-size="12" fill="#546e7a">navegador · curl</text>

  <rect x="40" y="190" width="185" height="150" rx="10" fill="#f5f7fa" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="132" y="213" text-anchor="middle" font-size="13" font-weight="700" fill="#37474f">Portas no host</text>
  <text x="56" y="240" font-size="12.5" fill="#2e7d32">● :80 → Nginx</text>
  <text x="56" y="266" font-size="12.5" fill="#e65100">● :9090 → Prometheus</text>
  <text x="56" y="292" font-size="12.5" fill="#f9a825">● :3000 → Grafana</text>
  <text x="56" y="320" font-size="11.5" fill="#b71c1c">✕ app: sem porta</text>

  <!-- ===================== Camada Ansible ===================== -->
  <rect x="40" y="470" width="185" height="175" rx="10" fill="#efe6f7" stroke="#6a1b9a" stroke-width="2"/>
  <text x="132" y="497" text-anchor="middle" font-size="15" font-weight="700" fill="#6a1b9a">Ansible</text>
  <text x="132" y="516" text-anchor="middle" font-size="11" fill="#7b1fa2">playbook.yml</text>
  <line x1="58" y1="528" x2="208" y2="528" stroke="#ce93d8" stroke-width="1"/>
  <text x="56" y="548" font-size="10.8" fill="#4a148c">1 · instala Docker</text>
  <text x="56" y="568" font-size="10.8" fill="#4a148c">2 · cria rede korp-net</text>
  <text x="56" y="588" font-size="10.8" fill="#4a148c">3 · build da imagem</text>
  <text x="56" y="608" font-size="10.8" fill="#4a148c">4 · sobe os containers</text>
  <text x="56" y="628" font-size="10.8" fill="#4a148c">5 · valida via HTTP</text>

  <!-- Seta Ansible -> Host -->
  <path d="M225 520 C 250 430, 250 360, 280 320" fill="none" stroke="#6a1b9a" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowPurple)"/>
  <text x="247" y="405" font-size="10.5" fill="#6a1b9a" transform="rotate(-72 247 405)">provisiona tudo</text>

  <!-- Seta Cliente -> host (nginx) -->
  <path d="M225 138 C 260 138, 270 150, 300 175" fill="none" stroke="#37474f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== Host ===================== -->
  <rect x="260" y="100" width="900" height="600" rx="14" fill="#fafbfc" stroke="#b0bec5" stroke-width="2"/>
  <text x="280" y="126" font-size="14" font-weight="700" fill="#78909c">Host Linux — Docker Engine</text>

  <!-- Rede bridge -->
  <rect x="290" y="150" width="575" height="510" rx="12" fill="#eaf3fc" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="8 5"/>
  <text x="310" y="174" font-size="13" font-weight="700" fill="#1565c0">rede bridge: korp-net</text>

  <!-- Container: nginx -->
  <rect x="315" y="195" width="225" height="105" rx="10" fill="#e6f4ea" stroke="#2e7d32" stroke-width="2"/>
  <text x="427" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#1b5e20">nginx</text>
  <text x="427" y="240" text-anchor="middle" font-size="11" fill="#2e7d32">proxy reverso</text>
  <text x="427" y="262" text-anchor="middle" font-size="11" fill="#37474f">host :80 ↔ 80</text>
  <text x="427" y="283" text-anchor="middle" font-size="10.5" fill="#607d8b">vol: /etc/nginx/conf.d</text>

  <!-- Container: app Go -->
  <rect x="615" y="195" width="225" height="105" rx="10" fill="#e0f7fa" stroke="#00838f" stroke-width="2"/>
  <text x="727" y="218" text-anchor="middle" font-size="14" font-weight="700" fill="#006064">http-server-projeto-korp</text>
  <text x="727" y="236" text-anchor="middle" font-size="11" fill="#00838f">Go · :8080 (interno)</text>
  <text x="727" y="258" text-anchor="middle" font-size="10.5" fill="#37474f">/projeto-korp · /health</text>
  <text x="727" y="276" text-anchor="middle" font-size="10.5" fill="#37474f">/metrics (Prometheus)</text>
  <text x="727" y="293" text-anchor="middle" font-size="10" fill="#b71c1c">sem porta publicada</text>

  <!-- Container: prometheus -->
  <rect x="315" y="430" width="225" height="105" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="427" y="455" text-anchor="middle" font-size="15" font-weight="700" fill="#bf360c">Prometheus</text>
  <text x="427" y="475" text-anchor="middle" font-size="11" fill="#e65100">coleta de métricas</text>
  <text x="427" y="497" text-anchor="middle" font-size="11" fill="#37474f">host :9090 ↔ 9090</text>
  <text x="427" y="518" text-anchor="middle" font-size="10.5" fill="#607d8b">prometheus.yml</text>

  <!-- Container: grafana -->
  <rect x="615" y="430" width="225" height="105" rx="10" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <text x="727" y="455" text-anchor="middle" font-size="15" font-weight="700" fill="#f57f17">Grafana</text>
  <text x="727" y="475" text-anchor="middle" font-size="11" fill="#f9a825">visualização (dashboard)</text>
  <text x="727" y="497" text-anchor="middle" font-size="11" fill="#37474f">host :3000 ↔ 3000</text>
  <text x="727" y="518" text-anchor="middle" font-size="10.5" fill="#607d8b">datasource + dashboard</text>
  <text x="727" y="532" text-anchor="middle" font-size="9.5" fill="#2e7d32">provisionados (bônus)</text>

  <!-- Fluxos internos -->
  <!-- nginx -> app -->
  <line x1="540" y1="247" x2="615" y2="247" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="577" y="239" text-anchor="middle" font-size="10" fill="#1565c0">proxy_pass</text>
  <text x="577" y="262" text-anchor="middle" font-size="9.5" fill="#1565c0">:8080</text>

  <!-- prometheus -> app (scrape) -->
  <path d="M470 430 C 510 380, 600 350, 660 300" fill="none" stroke="#e65100" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="540" y="372" font-size="10" fill="#bf360c">scrape /metrics</text>

  <!-- grafana -> prometheus (datasource) -->
  <line x1="615" y1="482" x2="540" y2="482" stroke="#f57f17" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="577" y="475" text-anchor="middle" font-size="9.5" fill="#f57f17">query</text>

  <!-- ===================== Build pipeline ===================== -->
  <rect x="895" y="195" width="240" height="200" rx="12" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.8"/>
  <text x="1015" y="220" text-anchor="middle" font-size="13.5" font-weight="700" fill="#6a1b9a">Build — Dockerfile</text>
  <text x="1015" y="238" text-anchor="middle" font-size="11" fill="#8e24aa">multi-stage</text>

  <rect x="915" y="252" width="200" height="42" rx="8" fill="#ffffff" stroke="#ab47bc" stroke-width="1.3"/>
  <text x="1015" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#4a148c">Stage 1 — golang:alpine</text>
  <text x="1015" y="286" text-anchor="middle" font-size="10" fill="#7b1fa2">compila binário estático</text>

  <line x1="1015" y1="296" x2="1015" y2="316" stroke="#8e24aa" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <rect x="915" y="320" width="200" height="44" rx="8" fill="#ffffff" stroke="#ab47bc" stroke-width="1.3"/>
  <text x="1015" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#4a148c">Stage 2 — alpine (não-root)</text>
  <text x="1015" y="354" text-anchor="middle" font-size="10" fill="#7b1fa2">imagem final enxuta</text>

  <!-- build -> app -->
  <path d="M915 342 C 875 342, 860 300, 842 270" fill="none" stroke="#8e24aa" stroke-width="2.2" stroke-dasharray="5 4" marker-end="url(#arrowPurple)"/>
  <text x="858" y="318" font-size="9.5" fill="#6a1b9a">imagem</text>

  <!-- ===================== Transparência IA ===================== -->
  <rect x="40" y="725" width="1120" height="165" rx="14" fill="#eef2ff" stroke="#3f51b5" stroke-width="2"/>
  <text x="600" y="753" text-anchor="middle" font-size="16" font-weight="700" fill="#283593">Transparência — Uso de Inteligência Artificial no projeto</text>

  <!-- Claude -->
  <rect x="70" y="770" width="520" height="100" rx="10" fill="#ffffff" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="90" y="795" font-size="14" font-weight="700" fill="#303f9f">Claude IA (Anthropic)</text>
  <text x="90" y="817" font-size="11.5" fill="#37474f">• Verificação e revisão do código (Go, YAML, Dockerfile)</text>
  <text x="90" y="836" font-size="11.5" fill="#37474f">• Definição dos caminhos e da arquitetura a seguir</text>
  <text x="90" y="855" font-size="11.5" fill="#37474f">• Boas práticas de segurança (usuário não-root, exposição mínima)</text>

  <!-- NotebookLM -->
  <rect x="610" y="770" width="520" height="100" rx="10" fill="#ffffff" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="630" y="795" font-size="14" font-weight="700" fill="#303f9f">NotebookLM (Google)</text>
  <text x="630" y="817" font-size="11.5" fill="#37474f">• Estudo e aprendizado das ferramentas do stack</text>
  <text x="630" y="836" font-size="11.5" fill="#37474f">• Apoio à compreensão de conceitos com pouco contato prévio</text>
  <text x="630" y="855" font-size="11.5" fill="#37474f">  (Docker, Prometheus, Grafana, Ansible)</text>
</svg>

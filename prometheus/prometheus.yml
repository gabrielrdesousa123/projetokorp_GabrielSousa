# Configuração do Prometheus - Desafio Projeto Korp
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Coleta as métricas expostas pelo serviço Go em /metrics.
  # O alvo usa o nome do serviço na rede korp-net (DNS interno do Compose).
  - job_name: "http-server-projeto-korp"
    metrics_path: /metrics
    static_configs:
      - targets: ["http-server-projeto-korp:8080"]

  # (Opcional) o Prometheus monitorando a si mesmo.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

# Proxy reverso: encaminha as requisições recebidas na porta 80
# para o serviço http-server-projeto-korp na porta 8080.
# O nome "http-server-projeto-korp" é resolvido via DNS interno do
# Docker Compose (nome do serviço na rede korp-net).

upstream korp_backend {
    server http-server-projeto-korp:8080;
}

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://korp_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
